<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lazarus — Bar & Gallery, New York</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div id="bg" aria-hidden="true"></div>
  <div id="bg-next" aria-hidden="true"></div>
  <div id="overlay" aria-hidden="true"></div>

  <main id="main">
    <h1>LAZARUS</h1>
    <p class="tagline">Making contemporary art a bit less scary with the help of liquid courage</p>
    <form class="signup-form" action="#" method="post">
      <div class="signup-field">
        <label for="email" class="sr-only">Email address</label>
        <input type="email" id="email" name="email" placeholder="Your email" required autocomplete="email" />
        <button type="submit" aria-label="Sign up">→</button>
      </div>
    </form>
    <p class="signup-label">Sign up to stay tuned with our latest events</p>
  </main>

  <footer id="footer">
    <div class="footer-left">
      <a href="mailto:hello@lazaruslazarus.xyz" class="footer-artist-link">Artist? Work with us.</a>
    </div>
    <a href="https://instagram.com/lazarusnyclazarus" aria-label="Instagram" class="instagram-link" target="_blank" rel="noopener noreferrer">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <rect x="2" y="2" width="20" height="20" rx="5" ry="5"/>
        <circle cx="12" cy="12" r="4"/>
        <circle cx="17.5" cy="6.5" r="0.5" fill="currentColor" stroke="none"/>
      </svg>
    </a>
  </footer>

  <div id="artwork-credit" aria-live="polite"></div>

  <script src="main.js"></script>
</body>
</html>
